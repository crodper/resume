name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-extra-utils \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-extra \
            latexmk \
            imagemagick

      - name: Build resume
        run: |
          python scripts/build_resume.py --data data/resume.yaml --template templates/resume.tex.j2 --out build/

      - name: Convert PDF to PNG
        run: |
          cd build/
          convert -density 300 resume.pdf -quality 100 resume.png

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/resume.pdf
            build/resume.png
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
