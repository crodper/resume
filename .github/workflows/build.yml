name: Build Resume

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-latex-extra
      
      - name: Build resume
        run: |
          cmake -B build
          cmake --build build
      
      - name: Verify PDF was generated
        run: |
          if [ ! -f build/resume.pdf ]; then
            echo "ERROR: resume.pdf was not generated"
            exit 1
          fi
          ls -lh build/resume.pdf
      
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v3
        with:
          name: resume
          path: build/resume.pdf
          retention-days: 30
