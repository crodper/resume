    keywords:
      - Wireless (BLE/Bluetooth Low Energy, WiFi 802.11)
      - Wired (I2C, SPI, UART, CAN bus, RS-485)
      - IoT Protocols (MQTT, WebSocket, HTTPS, TLS/SSL)
